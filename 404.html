<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — RSK Plugin Suite</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#06071a;--cyan:#00e5ff;--cyan-glow:rgba(0,229,255,.5);--pink:#e91e8c;--text:#c8d8f0;--text2:#7a90b8;--grid:rgba(0,229,255,.03);}
body{background:var(--bg);color:var(--text);font-family:'Exo 2',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:44px 44px;pointer-events:none;}
canvas{position:fixed;inset:0;pointer-events:none;opacity:.4;}
.wrap{position:relative;z-index:1;text-align:center;padding:2rem;}
.code{font-family:'Rajdhani',sans-serif;font-size:clamp(6rem,20vw,12rem);font-weight:900;line-height:1;color:var(--cyan);text-shadow:0 0 60px var(--cyan-glow),0 0 120px rgba(0,229,255,.2);animation:flicker 4s ease-in-out infinite;}
@keyframes flicker{0%,100%{opacity:1;}92%{opacity:1;}93%{opacity:.4;}94%{opacity:1;}96%{opacity:.5;}97%{opacity:1;}}
.label{font-family:'Share Tech Mono',monospace;font-size:.8rem;color:var(--cyan);letter-spacing:.3em;text-transform:uppercase;opacity:.7;margin-bottom:1rem;}
.msg{font-family:'Rajdhani',sans-serif;font-size:1.6rem;font-weight:700;color:#fff;margin-bottom:.5rem;}
.sub{font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--text2);margin-bottom:2.5rem;line-height:1.7;}
.btn{display:inline-flex;align-items:center;gap:.5rem;background:var(--cyan);color:#000;border:none;border-radius:6px;padding:12px 28px;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.95rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;cursor:pointer;transition:all .2s;box-shadow:0 0 20px var(--cyan-glow);}
.btn:hover{background:#fff;box-shadow:0 0 35px var(--cyan);}
.btn-s{display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:var(--text2);border:1px solid rgba(30,42,86,.9);border-radius:6px;padding:12px 28px;font-family:'Rajdhani',sans-serif;font-weight:600;font-size:.95rem;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;margin-left:.8rem;transition:all .2s;}
.btn-s:hover{border-color:var(--cyan);color:var(--cyan);}
.hex{margin:0 auto 2rem;display:block;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="wrap">
  <svg class="hex" width="100" height="100" viewBox="-20 -20 240 240">
    <polygon points="100,10 185,55 185,145 100,190 15,145 15,55" fill="#0a0c24" stroke="#00e5ff" stroke-width="2.5"/>
    <text x="100" y="108" text-anchor="middle" dominant-baseline="middle" font-family="Rajdhani,sans-serif" font-size="62" font-weight="900" fill="#00e5ff">RSK</text>
  </svg>
  <p class="label">Error — Page not found</p>
  <div class="code">404</div>
  <p class="msg">This page doesn't exist.</p>
  <p class="sub">The URL you entered is not part of the RSK Plugin Suite.<br>Maybe you were looking for something else?</p>
  <a href="/" class="btn">← Back to Home</a>
  <a href="https://ramsak.itch.io" target="_blank" rel="noopener" class="btn-s">itch.io ↗</a>
</div>
<script>
var c=document.getElementById('c'),ctx=c.getContext('2d'),pts=[];
function resize(){c.width=innerWidth;c.height=innerHeight;}
function mk(){return{x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*1.5+.5,vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,a:Math.random()};}
resize();window.addEventListener('resize',resize);
for(var i=0;i<60;i++)pts.push(mk());
function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(function(p){p.x+=p.vx;p.y+=p.vy;p.a+=.005;if(p.x<0)p.x=c.width;if(p.x>c.width)p.x=0;if(p.y<0)p.y=c.height;if(p.y>c.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle='rgba(0,229,255,'+(0.2+0.3*Math.abs(Math.sin(p.a)))+')';ctx.fill();});requestAnimationFrame(draw);}
draw();
</script>
</body>
</html>
